# C-125 顧客車検リマインダー・定期点検管理 設定ファイル
# ここを変更するだけで顧客ごとのカスタマイズが完結する

# ── データ品質チェック設定 ──────────────────────────
expected_record_count: 50      # 期待する総レコード数（最小）
max_imputed_ratio: 0.10        # 欠損補完の許容割合（10%まで）

# ── 車検期限判定設定 ──────────────────────────────────
inspection_cycle_days: 730     # 車検有効期間（2年 = 730日）
alert_thresholds:
  overdue: 0                    # 期限切れ
  urgent: 30                    # 30日以内 → 要連絡
  caution: 60                   # 60日以内 → 要注意

oil_change_interval_days: 180   # オイル交換推奨間隔（6ヶ月 = 180日）

# ── 出力設定 ──────────────────────────────────────
output_csv: "output/cleaned_customers.csv"
report_title: "顧客車検リマインダー分析レポート"
